name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          tar czf "dist/electromonkey-${VERSION}.tar.gz" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dist' \
            src/ plugins/ scripts/ package.json package-lock.json README.md AGENTS.md
          cd dist && sha256sum "electromonkey-${VERSION}.tar.gz" > checksums.txt

      - name: Extract changelog from tag
        id: changelog
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" 2>/dev/null || echo "")
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Release ${GITHUB_REF_NAME}"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/electromonkey-*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
