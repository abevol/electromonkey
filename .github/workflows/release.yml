name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build release package
        run: |
          node scripts/build.js
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist && zip -r "electromonkey-${VERSION}.zip" electromonkey/
          sha256sum "electromonkey-${VERSION}.zip" > checksums.txt

      - name: Extract changelog from tag
        id: changelog
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" 2>/dev/null || echo "")
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Release ${GITHUB_REF_NAME}"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/electromonkey-*.zip
            dist/checksums.txt
          generate_release_notes: true
